<!DOCTYPE html>
<html lang="de">

 .lang-btn{color:#fff;cursor:pointer;margin-left:5px;border:1px solid #fff;background:none;padding:2px 5px}

<body>

<script>
function setLang(l){
 document.querySelectorAll('[data-'+l+']').forEach(el=>el.innerText=el.getAttribute('data-'+l));
}
setLang('de');
</script>
</body>
</html>
